name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      # Build binary first (required for mcp_handshake test which spawns it)
      - run: cargo build -p iris-dev
      # Unit + handshake tests — no live IRIS needed.
      # Integration tests (test_mcp_iris, test_e2e_all_tools, test_scm, discovery_tests,
      # interop_e2e_tests) require IRIS_HOST/IRIS_WEB_PORT; run them locally.
      - run: |
          cargo test -p iris-dev-core --lib \
            --test test_compile_params \
            --test test_doc_params \
            --test test_elicitation \
            --test interop_unit_tests \
            --test manifest_tests \
            --test skills_tests \
            --test vscode_config_tests \
            --test mcp_handshake
        env:
          RUST_LOG: warn

  benchmark-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: Verify benchmark task YAML parses clean
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'benchmark/021/runner')
          from task_loader import load_tasks
          tasks = load_tasks()
          print(f'OK: {len(tasks)} tasks loaded and validated')
          "

  windows-handshake:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p iris-dev
      - name: MCP handshake smoke test on Windows
        shell: pwsh
        run: |
          $init = '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1"}}}'
          # Ignore exit code from iris-dev — it exits non-zero when stdin closes
          $result = $init | & "target\debug\iris-dev.exe" mcp 2>$null
          $exitCode = $LASTEXITCODE
          Write-Host "Response: $result"
          Write-Host "Binary exit code: $exitCode (expected non-zero — stdin closed)"
          if ($result -match '"capabilities"') {
            Write-Host "PASS: capabilities advertised on Windows"
            exit 0
          } else {
            Write-Host "FAIL: no capabilities in response. Got: $result"
            exit 1
          }

  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: mlugg/setup-zig@v2
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target x86_64-unknown-linux-musl -p iris-dev
      - run: file target/x86_64-unknown-linux-musl/release/iris-dev
      - run: |
          ldd target/x86_64-unknown-linux-musl/release/iris-dev 2>&1 | grep -q "not a dynamic executable" && echo "SC-002 PASS: static binary confirmed" || echo "NOTE: may have dynamic deps on musl"
