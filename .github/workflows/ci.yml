name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      # Build binary first (required for mcp_handshake test which spawns it)
      - run: cargo build -p iris-dev
      # Unit + handshake tests — no live IRIS needed.
      # Integration tests (test_mcp_iris, test_e2e_all_tools, test_scm, discovery_tests,
      # interop_e2e_tests) require IRIS_HOST/IRIS_WEB_PORT; run them locally.
      - run: |
          cargo test -p iris-dev-core --lib \
            --test test_compile_params \
            --test test_doc_params \
            --test test_elicitation \
            --test interop_unit_tests \
            --test manifest_tests \
            --test skills_tests \
            --test vscode_config_tests \
            --test mcp_handshake
        env:
          RUST_LOG: warn

  benchmark-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: Verify benchmark task YAML parses clean
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'benchmark/021/runner')
          from task_loader import load_tasks
          tasks = load_tasks()
          print(f'OK: {len(tasks)} tasks loaded and validated')
          "

  windows-handshake:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p iris-dev
      - name: MCP handshake smoke test on Windows
        shell: pwsh
        run: |
          $init = '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1"}}}'
          # Ignore exit code from iris-dev — it exits non-zero when stdin closes
          $result = $init | & "target\debug\iris-dev.exe" mcp 2>$null
          $exitCode = $LASTEXITCODE
          Write-Host "Response: $result"
          Write-Host "Binary exit code: $exitCode (expected non-zero — stdin closed)"
          if ($result -match '"capabilities"') {
            Write-Host "PASS: capabilities advertised on Windows"
            exit 0
          } else {
            Write-Host "FAIL: no capabilities in response. Got: $result"
            exit 1
          }

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p iris-dev
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx pyyaml
      - name: Start IRIS container
        run: |
          docker run -d --name iris-e2e \
            -p 52773:52773 \
            -e ISC_DATA_DIRECTORY=/irissys/data \
            intersystemsdc/iris-community:latest
          # Wait for container to be running
          sleep 10
          docker ps | grep iris-e2e
      - name: Wait for IRIS Atelier API to be ready (up to 6 minutes)
        run: |
          IRIS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' iris-e2e)
          echo "IRIS container IP: $IRIS_IP"
          for i in $(seq 1 72); do
            # Try both container IP and localhost
            for host in localhost $IRIS_IP; do
              status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 \
                -u _SYSTEM:SYS "http://$host:52773/api/atelier/" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "IRIS Atelier API ready at $host:52773 after $((i * 5))s"
                echo "IRIS_HOST=$host" >> $GITHUB_ENV
                exit 0
              fi
            done
            echo "Waiting... ($((i * 5))s)"
            sleep 5
          done
          echo "IRIS did not become ready in 6 minutes"
          docker logs iris-e2e 2>&1 | tail -30
          docker inspect iris-e2e | python3 -c "import json,sys; c=json.load(sys.stdin)[0]; print('Ports:', c['NetworkSettings']['Ports'])"
          exit 1
      - name: Run E2E tool tests against live IRIS
        run: pytest tests/integration/test_022_all_tools.py --tb=short -q
        env:
          IRIS_HOST: ${{ env.IRIS_HOST }}
          IRIS_WEB_PORT: "52773"
          IRIS_USERNAME: _SYSTEM
          IRIS_PASSWORD: SYS
          IRIS_NAMESPACE: USER

  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: mlugg/setup-zig@v2
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target x86_64-unknown-linux-musl -p iris-dev
      - run: file target/x86_64-unknown-linux-musl/release/iris-dev
      - run: |
          ldd target/x86_64-unknown-linux-musl/release/iris-dev 2>&1 | grep -q "not a dynamic executable" && echo "SC-002 PASS: static binary confirmed" || echo "NOTE: may have dynamic deps on musl"
