name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: iris-dev-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: iris-dev-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: iris-dev-macos-x86_64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: iris-dev-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p iris-dev
      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/iris-dev"
          [[ -f "${src}.exe" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd vscode-iris-dev && npm ci && npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris-dev/vscode-iris-dev-*.vsix

  release:
    needs: [build, build-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            iris-dev-linux-x86_64
            iris-dev-macos-arm64
            iris-dev-macos-x86_64
            iris-dev-windows-x86_64.exe
            vscode-iris-dev-*.vsix
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS / Linux — one-liner
            ```bash
            curl -fsSL https://github.com/intersystems-community/iris-dev/releases/latest/download/iris-dev-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/x86_64/;s/arm64/arm64/;s/aarch64/arm64/') -o /usr/local/bin/iris-dev && chmod +x /usr/local/bin/iris-dev
            ```

            ### Windows
            Download [`iris-dev-windows-x86_64.exe`](https://github.com/intersystems-community/iris-dev/releases/latest/download/iris-dev-windows-x86_64.exe), rename to `iris-dev.exe`, place on your PATH.
            Or set `iris-dev.serverPath` in VS Code settings to the full path — no PATH required.

            ### VS Code Extension
            Download `vscode-iris-dev-*.vsix` and install via **Extensions: Install from VSIX...** in VS Code 1.99+.

            ### Quick start
            ```bash
            # Set your IRIS connection (or use objectscript.conn in VS Code)
            export IRIS_HOST=localhost
            export IRIS_WEB_PORT=52773
            iris-dev mcp   # start MCP server
            ```

            See the [README](https://github.com/intersystems-community/iris-dev#readme) for full setup instructions.
