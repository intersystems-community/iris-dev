description: "Bench.Parser exists in BENCHMARK. The method Parse(str) is supposed to return the first word (before the first space) but has a logic error. Fix it."
expected_behavior: "##class(Bench.Parser).Parse('hello world') returns 'hello'. ##class(Bench.Parser).Parse('foo') returns 'foo'."
fixtures:
